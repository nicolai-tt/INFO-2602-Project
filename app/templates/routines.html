{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/routines.js') }}"></script>
{% endblock %}

{% block additional_styles %}
<style>
    .routine-card {
        border: none;
        border-radius: 1rem;
        transition: transform 0.2s;
        cursor: pointer;
    }

    .routine-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .routine-card .card-footer {
        background: transparent;
        border-top: 1px solid #f0f0f0;
    }
</style>
{% endblock %}

{% block subpage_content %}
<div class="container-fluid px-4">

    <!-- Page header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">My Routines</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createRoutineModal">
            <span class="material-symbols-outlined align-middle me-1" style="font-size:18px">add</span>
            New Routine
        </button>
    </div>

    <!-- Routines grid -->
    <div class="row g-3" id="routines-grid">
        <div class="col-12 text-center text-muted py-5">
            <span class="material-symbols-outlined" style="font-size:48px">format_list_bulleted</span>
            <p class="mt-2">Loading your routines...</p>
        </div>
    </div>

</div>


<!-- Create Routine Modal -->
<div class="modal fade" id="createRoutineModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content rounded-3">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">New Routine</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createRoutineForm">
                    <div class="mb-3">
                        <label class="form-label">Routine Name</label>
                        <input type="text" class="form-control" name="name"
                            placeholder="e.g. Push Day" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Description
                            <span class="text-muted">(optional)</span>
                        </label>
                        <textarea class="form-control" name="description" rows="2"
                            placeholder="What's this routine for?"></textarea>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Create Routine</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
